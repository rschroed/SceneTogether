name: PR Governance

on:
  pull_request:
    types:
      - opened
      - edited
      - synchronize
      - reopened
      - ready_for_review

permissions:
  contents: read
  pull-requests: read

jobs:
  branch-name:
    name: Branch name policy
    runs-on: ubuntu-latest
    steps:
      - name: Validate branch name
        env:
          HEAD_REF: ${{ github.head_ref }}
        run: |
          if [[ ! "$HEAD_REF" =~ ^codex\/(issue-[0-9]+-[a-z0-9-]+|spike-[a-z0-9-]+|chore-[a-z0-9-]+)$ ]]; then
            echo "Branch '$HEAD_REF' does not match policy."
            echo "Expected one of:"
            echo "  codex/issue-123-short-slug"
            echo "  codex/spike-short-slug"
            echo "  codex/chore-short-slug"
            exit 1
          fi

  pr-body:
    name: PR body policy
    runs-on: ubuntu-latest
    steps:
      - name: Validate PR body
        uses: actions/github-script@v7
        with:
          script: |
            const body = context.payload.pull_request.body || "";
            const requiredSections = [
              "## Summary",
              "## Issue Link",
              "## Plan Check",
              "## Validation",
              "### Validation Details",
              "## Reviewer Notes",
            ];

            const missingSections = requiredSections.filter((section) => !body.includes(section));
            if (missingSections.length > 0) {
              core.setFailed(`Missing PR sections: ${missingSections.join(", ")}`);
              return;
            }

            if (!/Closes\s+#\d+/i.test(body) && !/Fixes\s+#\d+/i.test(body) && !/Resolves\s+#\d+/i.test(body)) {
              core.setFailed("PR must link a GitHub issue with 'Closes #<number>', 'Fixes #<number>', or 'Resolves #<number>'.");
              return;
            }

            const requiredChecks = [
              "- [x] The linked issue contains a written plan",
              "- [x] Scope stayed within the issue boundary",
            ];

            const missingChecks = requiredChecks.filter((check) => !body.includes(check));
            if (missingChecks.length > 0) {
              core.setFailed(`PR must affirm required plan checks: ${missingChecks.join(" | ")}`);
            }

