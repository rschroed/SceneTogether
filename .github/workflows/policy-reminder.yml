name: Policy Reminder

on:
  pull_request:
    types:
      - opened

permissions:
  pull-requests: write

jobs:
  comment:
    name: Post workflow reminder
    runs-on: ubuntu-latest
    steps:
      - name: Add reminder comment
        uses: actions/github-script@v7
        with:
          script: |
            const body = [
              "SceneTogether workflow reminder:",
              "",
              "- No code should start without a linked issue and written plan.",
              "- Keep this PR scoped to one coherent problem.",
              "- Record validation or call out the gap explicitly before merge.",
              "- Split follow-up ideas into separate issues instead of growing this PR.",
            ].join("\n");

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body,
            });
